<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Export Point</title>  <style>
    body{
      margin:0;
      font-family:Arial;
      background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
      color:#fff;
    }

    header{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:15px;
      background:#000;
      border-bottom:1px solid #222;
      flex-wrap:wrap;
    }

    header img{
      height:90px;
      width:auto;
      object-fit:contain;
    }

    header h1{
      margin:0;
      font-size:26px;
      letter-spacing:1px;
    }

    .top-bar{
      display:flex;
      justify-content:center;
      gap:10px;
      padding:10px;
      flex-wrap:wrap;
    }

    input{
      padding:10px;
      width:220px;
      border-radius:8px;
      border:none;
      outline:none;
    }

    .cart-box{
      background:#25D366;
      padding:10px 15px;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
    }

    .container{
      padding:15px;
    }

    h2{
      text-align:center;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:12px;
    }

    .card{
      background:rgba(255,255,255,0.05);
      padding:10px;
      border-radius:12px;
      text-align:center;
      border:1px solid rgba(255,255,255,0.08);
    }

    .card img{
      width:100%;
      height:180px;
      object-fit:cover;
      border-radius:10px;
    }

    .btn{
      display:inline-block;
      margin-top:6px;
      padding:7px 10px;
      background:#25D366;
      color:#fff;
      text-decoration:none;
      border-radius:6px;
      font-size:12px;
      cursor:pointer;
      border:none;
    }

    .order-btn{
      background:#ff9800;
    }

    /* CART MODAL */
    .modal{
      display:none;
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
    }

    .modal-content{
      background:#111;
      padding:20px;
      border-radius:12px;
      width:90%;
      max-width:400px;
    }

    .close{
      float:right;
      cursor:pointer;
      font-size:20px;
    }

    .cart-item{
      border-bottom:1px solid #333;
      padding:8px 0;
      font-size:14px;
    }

  </style></head>
<body><header>
  <img src="https://i.ibb.co/9kxM1SWK/file-000000006a44720693a61e760bbdff0f.png" />
  <h1>Export Point</h1>
</header><div class="top-bar">
  <input type="text" id="search" placeholder="Search dress..." onkeyup="render()" />
  <div class="cart-box" onclick="openCart()">
    Cart (<span id="cartCount">0</span>)
  </div>
</div><div class="container">
  <h2>Our Collection</h2>
  <div class="products" id="products"></div>
</div><!-- CART MODAL --><div class="modal" id="cartModal">
  <div class="modal-content">
    <span class="close" onclick="closeCart()">&times;</span>
    <h3>Your Cart</h3>
    <div id="cartItems"></div>
    <br>
    <a class="btn" href="https://wa.me/8801840501433">Checkout on WhatsApp</a>
  </div>
</div><footer style="text-align:center;padding:20px;background:#000;">
  <p>WhatsApp: 01840501433</p>
</footer><script>
let productsData = [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

fetch("products.json")
  .then(res => res.json())
  .then(data => {
    productsData = data;
    render();
  });

function render(){
  let search = document.getElementById("search").value.toLowerCase();
  let html = "";

  productsData
  .filter(p => p.name.toLowerCase().includes(search))
  .forEach((p) => {
    html += `
      <div class="card">
        <img src="${p.img}" />
        <h3>${p.name}</h3>
        <p>Size: ${p.size}</p>
        <p>Price: ${p.price}</p>
        <button class="btn" onclick='addToCart(${JSON.stringify(p)})'>Add to Cart</button>
        <a class="btn order-btn" href="https://wa.me/8801840501433?text=Order: ${p.name}">Order Now</a>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
  document.getElementById("cartCount").innerText = cart.length;
}

function addToCart(product){
  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));
  document.getElementById("cartCount").innerText = cart.length;
}

function openCart(){
  let modal = document.getElementById("cartModal");
  let items = document.getElementById("cartItems");

  items.innerHTML = "";

  cart.forEach(p => {
    items.innerHTML += `<div class='cart-item'>${p.name} - ${p.price}</div>`;
  });

  modal.style.display = "flex";
}

function closeCart(){
  document.getElementById("cartModal").style.display = "none";
}
</script></body>
</html>
