<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Export Point</title>  <style>
    body{
      margin:0;
      font-family:Arial;
      background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
      color:#fff;
    }

    header{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:15px;
      background:#000;
      border-bottom:1px solid #222;
      flex-wrap:wrap;
    }

    header img{
      height:90px;
      width:auto;
    }

    header h1{
      margin:0;
      font-size:26px;
    }

    .top-bar{
      display:flex;
      justify-content:center;
      gap:10px;
      padding:10px;
      flex-wrap:wrap;
    }

    input{
      padding:10px;
      width:220px;
      border-radius:8px;
      border:none;
      outline:none;
    }

    .cart-box{
      background:#25D366;
      padding:10px 15px;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
    }

    .container{
      padding:15px;
    }

    h2{text-align:center;}

    .products{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:12px;
    }

    .card{
      background:rgba(255,255,255,0.05);
      padding:10px;
      border-radius:12px;
      text-align:center;
      position:relative;
      border:1px solid rgba(255,255,255,0.08);
    }

    .card img{
      width:100%;
      height:180px;
      object-fit:cover;
      border-radius:10px;
    }

    .badge{
      position:absolute;
      top:8px;
      left:8px;
      background:red;
      padding:3px 7px;
      font-size:10px;
      border-radius:5px;
    }

    .btn{
      margin-top:6px;
      padding:7px 10px;
      background:#25D366;
      color:#fff;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-size:12px;
    }

    .order-btn{background:#ff9800;}

    /* CART */
    .modal{
      display:none;
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
    }

    .modal-content{
      background:#111;
      padding:20px;
      border-radius:12px;
      width:90%;
      max-width:420px;
      max-height:80vh;
      overflow:auto;
    }

    .cart-item{
      border-bottom:1px solid #333;
      padding:8px 0;
      font-size:14px;
    }

    /* FLOAT WHATSAPP */
    .float-wa{
      position:fixed;
      bottom:70px;
      right:15px;
      background:#25D366;
      padding:12px;
      border-radius:50%;
      font-size:20px;
      text-decoration:none;
    }

    /* BOTTOM MENU */
    .bottom-menu{
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      display:flex;
      justify-content:space-around;
      background:#000;
      padding:10px 0;
      border-top:1px solid #222;
    }

    .bottom-menu a{
      color:#fff;
      text-decoration:none;
      font-size:12px;
    }

  </style></head>
<body><header>
  <img src="https://i.ibb.co/9kxM1SWK/file-000000006a44720693a61e760bbdff0f.png" />
  <h1>Export Point</h1>
</header><div class="top-bar">
  <input id="search" placeholder="Search..." onkeyup="render()" />
  <div class="cart-box" onclick="openCart()">Cart (<span id="cartCount">0</span>)</div>
</div><div class="container">
  <h2>Our Collection</h2>
  <div class="products" id="products"></div>
</div><!-- CART --><div class="modal" id="cartModal">
  <div class="modal-content">
    <h3>Your Cart</h3>
    <div id="cartItems"></div>
    <br>
    <button class="btn order-btn" onclick="checkout()">Order Now</button>
  </div>
</div><!-- FLOAT WA --><a class="float-wa" href="https://wa.me/8801840501433">💬</a>

<!-- BOTTOM MENU --><div class="bottom-menu">
  <a href="#">Home</a>
  <a onclick="openCart()">Cart</a>
  <a href="https://wa.me/8801840501433">WhatsApp</a>
  <a href="https://www.facebook.com/share/14cGcMUQ1ZE/">Facebook</a>
</div><script>
let data=[];
let cart=JSON.parse(localStorage.getItem("cart"))||[];

fetch("products.json").then(r=>r.json()).then(d=>{data=d;render();});

function render(){
let s=document.getElementById("search").value.toLowerCase();
let html="";

data.filter(p=>p.name.toLowerCase().includes(s)).forEach(p=>{
html+=`
<div class='card'>
<span class='badge'>NEW</span>
<img src='${p.img}' />
<h3>${p.name}</h3>
<p>${p.size}</p>
<p>${p.price}</p>
<button class='btn' onclick='add(${JSON.stringify(p)})'>Add</button>
<button class='btn order-btn' onclick='buy("${p.name}","${p.size}","${p.price}")'>Order</button>
</div>`;
});

document.getElementById("products").innerHTML=html;
document.getElementById("cartCount").innerText=cart.length;
}

function add(p){cart.push(p);localStorage.setItem("cart",JSON.stringify(cart));render();}

function openCart(){
let h="";
cart.forEach((p,i)=>{
 h+=`<div class='cart-item'>${p.name} - ${p.price}</div>`;
});
document.getElementById("cartItems").innerHTML=h;
document.getElementById("cartModal").style.display="flex";
}

function checkout(){
let msg="🧾 ORDER\n\n";
cart.forEach(p=>{
msg+=`${p.name} | ${p.size} | ${p.price}\n`;
});
window.open("https://wa.me/8801840501433?text="+encodeURIComponent(msg));
}

function buy(n,s,p){
let msg=`🧾 ORDER\nProduct:${n}\nSize:${s}\nPrice:${p}`;
window.open("https://wa.me/8801840501433?text="+encodeURIComponent(msg));
}
</script></body>
</html>
