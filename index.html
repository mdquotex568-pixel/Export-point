<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Export Point</title>  <style>
    body{
      margin:0;
      font-family:Arial;
      background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
      color:#fff;
    }

    header{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:15px;
      background:#000;
      border-bottom:1px solid #222;
      flex-wrap:wrap;
    }

    header img{
      height:90px;
      width:auto;
      object-fit:contain;
    }

    header h1{
      margin:0;
      font-size:26px;
      letter-spacing:1px;
    }

    .top-bar{
      display:flex;
      justify-content:center;
      gap:10px;
      padding:10px;
      flex-wrap:wrap;
    }

    input{
      padding:10px;
      width:200px;
      border-radius:8px;
      border:none;
      outline:none;
    }

    .cart-box{
      background:#25D366;
      padding:10px 15px;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
    }

    .container{
      padding:15px;
    }

    h2{
      text-align:center;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:12px;
    }

    .card{
      background:rgba(255,255,255,0.05);
      padding:10px;
      border-radius:12px;
      text-align:center;
      border:1px solid rgba(255,255,255,0.08);
    }

    .card img{
      width:100%;
      height:180px;
      object-fit:cover;
      border-radius:10px;
    }

    .btn{
      display:inline-block;
      margin-top:8px;
      padding:7px 10px;
      background:#25D366;
      color:#fff;
      text-decoration:none;
      border-radius:6px;
      font-size:13px;
      cursor:pointer;
    }

    footer{
      margin-top:20px;
      background:#000;
      text-align:center;
      padding:20px;
    }

  </style></head>
<body><header>
  <img src="https://i.ibb.co/9kxM1SWK/file-000000006a44720693a61e760bbdff0f.png" />
  <h1>Export Point</h1>
</header><div class="top-bar">
  <input type="text" id="search" placeholder="Search dress..." onkeyup="render()" />
  <div class="cart-box" onclick="showCart()">
    Cart (<span id="cartCount">0</span>)
  </div>
</div><div class="container">
  <h2>Our Collection</h2>
  <div class="products" id="products"></div>
</div><footer>
  <p>WhatsApp: 01840501433</p>
  <a class="btn" href="https://wa.me/8801840501433">Order on WhatsApp</a>
</footer><script>
let productsData = [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

document.getElementById("cartCount").innerText = cart.length;

fetch("products.json")
  .then(res => res.json())
  .then(data => {
    productsData = data;
    render();
  });

function render(){
  let search = document.getElementById("search").value.toLowerCase();
  let html = "";

  productsData
  .filter(p => p.name.toLowerCase().includes(search))
  .forEach((p, i) => {
    html += `
      <div class="card">
        <img src="${p.img}" />
        <h3>${p.name}</h3>
        <p>Size: ${p.size}</p>
        <p>Price: ${p.price}</p>
        <button class="btn" onclick='addToCart(${JSON.stringify(p)})'>Add to Cart</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

function addToCart(product){
  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));
  document.getElementById("cartCount").innerText = cart.length;
  alert("Added to cart!");
}

function showCart(){
  let msg = "Your Cart:\n\n";
  cart.forEach(p => {
    msg += `${p.name} - ${p.price}\n`;
  });
  alert(msg);
}
</script></body>
</html>
