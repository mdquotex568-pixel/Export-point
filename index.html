<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Export Point</title>  <!-- Supabase JS -->  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>  <style>
    body {margin:0;font-family:Arial;background:#111;color:#fff;}
    header {background:#000;padding:15px;text-align:center;}
    header img {height:60px;}
    .container {padding:15px;}
    .products {display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;}
    .card {background:#1c1c1c;border-radius:10px;padding:10px;text-align:center;}
    .card img {width:100%;height:200px;object-fit:cover;border-radius:10px;}
    .btn {display:inline-block;margin-top:10px;padding:8px;background:#25D366;color:#fff;border-radius:5px;text-decoration:none;}
    footer {background:#000;padding:15px;text-align:center;margin-top:20px;}
    #adminPanel {display:none;}
    input,button {width:100%;margin:5px 0;padding:8px;border-radius:5px;border:none;}
    button {background:#ff4081;color:#fff;cursor:pointer;}
  </style></head>
<body><header>
  <img src="https://i.ibb.co.com/1YvF83N9/logo.png" alt="logo">
  <h1>Export Point</h1>
</header><div class="container"><button onclick="login()">Admin Login</button>

<div id="adminPanel">
  <h3>Add Product</h3>
  <input id="img" placeholder="Image URL">
  <input id="name" placeholder="Name">
  <input id="size" placeholder="Size">
  <input id="price" placeholder="Price">
  <button onclick="addProduct()">Add Product</button>
</div><h2>Our Collection</h2>
<div class="products" id="products"></div></div><footer>
  <p>WhatsApp: 01840501433</p>
  <a class="btn" href="https://wa.me/8801840501433">Order Now</a>
  <br><br>
  <a class="btn" href="https://www.facebook.com/share/14cGcMUQ1ZE/">Facebook</a>
</footer><script>

// 🔥 Supabase Config (এখানে তোমার URL + ANON KEY বসাবে)
const SUPABASE_URL = "https://apskcgqrhptsiuhztwmd.supabase.co";
const SUPABASE_ANON_KEY = "PASTE_YOUR_ANON_KEY_HERE";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let isAdmin = false;

function login(){
  let pass = prompt("Enter Password");
  if(pass === "ashikxxx11112222"){
    isAdmin = true;
    document.getElementById("adminPanel").style.display = "block";
  }
}

// ➕ Add Product
async function addProduct(){
  let img = document.getElementById("img").value;
  let name = document.getElementById("name").value;
  let size = document.getElementById("size").value;
  let price = document.getElementById("price").value;

  if(!img || !name || !size || !price){
    alert("Fill all fields");
    return;
  }

  await client.from("products").insert([{img,name,size,price}]);

  alert("Product Added!");

  loadProducts();
}

// 📦 Load Products
async function loadProducts(){
  let { data } = await client.from("products").select("*").order('id', { ascending: false });

  let html = "";

  data.forEach(p=>{
    html += `
    <div class="card">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <p>Size: ${p.size}</p>
      <p>Price: ${p.price}</p>
      <a class="btn" href="https://wa.me/8801840501433?text=I want to order ${p.name}">Order</a>
    </div>`;
  });

  document.getElementById("products").innerHTML = html;
}

loadProducts();

</script></body>
</html>
