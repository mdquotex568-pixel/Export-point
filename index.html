<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Export Point</title>  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#111;
      color:#fff;
    }

    header{
      text-align:center;
      padding:15px;
      background:#000;
    }

    header h1{
      margin:0;
      font-size:24px;
      color:#fff;
    }

    .container{
      padding:15px;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:15px;
    }

    .card{
      background:#1e1e1e;
      padding:10px;
      border-radius:10px;
      text-align:center;
    }

    .card img{
      width:100%;
      height:200px;
      object-fit:cover;
      border-radius:10px;
    }

    .btn{
      display:inline-block;
      margin-top:8px;
      padding:8px;
      background:#25D366;
      color:#fff;
      text-decoration:none;
      border-radius:5px;
    }

    footer{
      margin-top:20px;
      background:#000;
      text-align:center;
      padding:15px;
    }

  </style></head>
<body><header>
  <img src="https://pin.it/18wrx0q3b" alt="logo" style="height:60px;max-width:100%;" />
  <h1>Export Point</h1>
</header><div class="container">
  <h2>Our Collection</h2>
  <div class="products" id="products"></div>
</div><footer>
  <p>WhatsApp: 01840501433</p>
  <a class="btn" href="https://wa.me/8801840501433">Order on WhatsApp</a>
  <br><br>
  <a class="btn" href="https://www.facebook.com/share/14cGcMUQ1ZE/">Facebook Page</a>
</footer><script>
  fetch("products.json")
    .then(res => res.json())
    .then(data => {
      let html = "";

      data.forEach(p => {
        html += `
          <div class="card">
            <img src="${p.img}" alt="product">
            <h3>${p.name}</h3>
            <p>Size: ${p.size}</p>
            <p>Price: ${p.price}</p>
            <a class="btn" href="https://wa.me/8801840501433?text=I want to order ${p.name}">Order</a>
          </div>
        `;
      });

      document.getElementById("products").innerHTML = html;
    });
</script></body>
</html>
